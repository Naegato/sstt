services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-card_game}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-card_game}
      POSTGRES_DB: ${POSTGRES_DB:-card_game}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - card_game_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-card_game}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  card_game_postgres_data:
