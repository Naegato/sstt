services:
  server:
    image: ghcr.io/naegato/sstt/server:latest
    ports:
      - "3011:3001"
    environment:
      PORT: 3001
      ALLOWED_ORIGINS: https://card-game.wiatr.fr
      WEB_ORIGIN: https://card-game.wiatr.fr
      # Les Client ID ne sont pas secrets (visibles dans l'URL d'autorisation
      # OAuth elle-même) — seuls les Client Secret le sont, voir plus bas.
      DISCORD_CLIENT_ID: "1528102567954092195"
      DISCORD_REDIRECT_URI: https://api-card-game.wiatr.fr/api/auth/discord/callback
      GOOGLE_CLIENT_ID: 698981807192-2u79dt4l32sv6pitlbvvhj1po12u04ue.apps.googleusercontent.com
      GOOGLE_REDIRECT_URI: https://api-card-game.wiatr.fr/api/auth/google/callback
    # Les secrets Docker ne sont jamais exposés comme variables d'env
    # directement (juste montés en fichiers sous /run/secrets/) — ce wrapper
    # les lit une fois au démarrage plutôt que de modifier config/env.ts pour
    # supporter des variantes _FILE, cohérent avec le principe "pas de
    # sur-ingénierie" du projet pour ce cas d'usage ponctuel.
    command:
      - sh
      - -c
      - >
        export DATABASE_URL="postgres://card_game:$$(cat /run/secrets/db_password)@postgres:5432/card_game";
        export JWT_SECRET="$$(cat /run/secrets/jwt_secret)";
        export DISCORD_CLIENT_SECRET="$$(cat /run/secrets/discord_client_secret)";
        export GOOGLE_CLIENT_SECRET="$$(cat /run/secrets/google_client_secret)";
        export DEBUG_TOKEN="$$(cat /run/secrets/debug_token)";
        exec bun run dist/index.js
    secrets:
      - db_password
      - jwt_secret
      - discord_client_secret
      - google_client_secret
      - debug_token
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - card-game

  web:
    image: ghcr.io/naegato/sstt/web:latest
    ports:
      - "3010:3000"
    # apps/web/src/lib/session.ts vérifie le JWT localement (Server Components,
    # sans repasser par le réseau) avec ce secret — DOIT être identique à celui
    # du service `server` ci-dessus, sinon la vérification échoue toujours
    # silencieusement (repli sur "dev-secret-change-me") et aucune session
    # n'est jamais reconnue côté web, même après une connexion réussie
    # (cookie posé correctement par `server`, mais jamais lu avec succès par
    # `web`) : bug réel constaté en prod sur OAuth Google/Discord ET
    # email/mot de passe, aucune erreur visible, juste "jamais connecté".
    command:
      - sh
      - -c
      - >
        export JWT_SECRET="$$(cat /run/secrets/jwt_secret)";
        exec bun run server.js
    secrets:
      - jwt_secret
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - card-game

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: card_game
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: card_game
    secrets:
      - db_password
    volumes:
      - card_game_postgres_data:/var/lib/postgresql/data
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
    networks:
      - card-game

secrets:
  db_password:
    external: true
  jwt_secret:
    external: true
  discord_client_secret:
    external: true
  google_client_secret:
    external: true
  debug_token:
    external: true

volumes:
  card_game_postgres_data:

networks:
  card-game:
    external: true
